name: Regenerate npm lockfile

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json

      - name: Generate lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Restore reproducible Docker installs
        run: |
          sed -i 's/npm install --ignore-scripts/npm ci/' Dockerfile
          sed -i 's/npm install --omit=dev --ignore-scripts/npm ci --omit=dev --ignore-scripts/' Dockerfile

      - name: Verify clean install
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Remove temporary workflow
        run: rm .github/workflows/regenerate-lockfile.yml

      - name: Commit generated lockfile
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json Dockerfile .github/workflows/regenerate-lockfile.yml
          git commit -m "chore(deps): restore reproducible npm installs

          Why: Railway was temporarily using npm install because package-lock.json had been removed, making dependency resolution non-reproducible.

          Decision: Regenerate the lockfile from package.json, verify npm ci, tests, and the production build, then restore npm ci in both Docker stages.

          🤖 Generated with GitHub Actions / Node.js 22"
          git push
