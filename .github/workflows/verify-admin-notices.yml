name: Verify admin notices

on:
  pull_request:
    paths:
      - 'src/**'
      - 'client/**'
      - 'migrations/**'
      - 'test/**'
      - 'package*.json'
      - '.github/workflows/verify-admin-notices.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
